<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Satellite Antenna Tracker</title>

  <!-- Favicons -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="any">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Google Material Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>

  <!-- App styles -->
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- Top App Bar -->
  <header id="app-bar">
    <div class="app-left">

      <div class="search-wrap">
        <div class="search-container" title="Search location">
          <span class="material-icons">search</span>
          <input id="search" type="text" placeholder="Search location" autocomplete="off" />
        </div>
        <div id="autocomplete"
             class="autocomplete hidden"
             role="listbox"
             aria-label="Location suggestions"></div>
      </div>

      <button id="geo"
              class="icon-btn"
              title="Use current location"
              aria-label="Use current location">
        <span class="material-icons">my_location</span>
      </button>

      <button id="sat-toggle"
              class="icon-btn"
              title="Satellites"
              aria-label="Satellites">
        <span class="material-icons">satellite_alt</span>
      </button>

    </div>
  </header>

  <!-- Map -->
  <div id="map"></div>

  <!-- Backdrop -->
  <div id="sat-backdrop" class="sat-backdrop"></div>

  <!-- Satellite Panel -->
  <aside id="sat-panel" aria-label="Satellite panel">
    <div class="panel-header">
      <div class="panel-title">
        <span class="material-icons">satellite_alt</span>
        <span>Satellites</span>
      </div>

      <div class="panel-actions">
        <label class="select-wrap" title="Sort satellites">
          <span class="material-icons">sort</span>
          <select id="sort" aria-label="Sort satellites">
            <option value="lon" selected>Longitude</option>
            <option value="el">Elevation</option>
          </select>
        </label>

        <!-- ✅ Pin panel -->
        <button id="panel-pin"
                class="icon-btn"
                title="Pin panel"
                aria-label="Pin panel">
          <span class="material-icons">push_pin</span>
        </button>

        <button id="panel-close"
                class="icon-btn"
                title="Close"
                aria-label="Close">
          <span class="material-icons">close</span>
        </button>
      </div>
    </div>

    <div class="panel-body">

      <!-- Combined Observer + Selection row -->
      <section class="panel-info-row">
        <div class="info-card">
          <div class="section-title">Observer</div>
          <div id="observer-info" class="section-body">
            <div class="muted">Click map to set observer location.</div>
          </div>
        </div>

        <div class="info-card">
          <div class="section-title">Selection</div>
          <div id="selected-info" class="section-body">
            <div class="muted">None (tap a row)</div>
          </div>
        </div>
      </section>

      <!-- Cutoff -->
      <section class="panel-section">
        <div class="cutoff-row">
          <span class="cutoff-label">Elevation cutoff</span>
          <span class="cutoff-value"><span id="cutoff-value">0</span>°</span>
        </div>

        <input id="cutoff"
               type="range"
               min="0"
               max="30"
               step="1"
               value="0"
               aria-label="Elevation cutoff slider">

        <div class="cutoff-hint">
          Showing satellites with El ≥ <span id="cutoff-hint-value">0</span>°
        </div>
      </section>

      <div id="sat-table"></div>
    </div>
  </aside>

  <!-- Legacy (hidden) -->
  <div id="info"></div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/satellite.js@6.0.2/dist/satellite.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
