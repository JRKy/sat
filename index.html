<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Satellite Antenna Tracker</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    .material-symbols-rounded {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>

  <link rel="stylesheet" href="styles/main.css" />
</head>

<body>

  <!-- Map -->
  <div id="map"></div>

  <!-- Floating Window -->
  <div id="sat-window">

    <!-- Drag handle / title bar -->
    <div id="win-header">
      <span class="material-symbols-rounded win-icon">satellite_alt</span>
      <div id="win-title">
        <span id="win-title-text">Satellite Tracker</span>
        <span id="win-title-pill"></span>
      </div>
      <button id="win-minimize" class="icon-btn" title="Minimize">
        <span class="material-symbols-rounded">remove</span>
      </button>
    </div>

    <!-- Tab bar -->
    <div id="win-tabs">
      <button class="tab-btn active" data-tab="pointing">
        <span class="material-symbols-rounded">explore</span>
        Pointing
      </button>
      <button class="tab-btn" data-tab="list">
        <span class="material-symbols-rounded">format_list_bulleted</span>
        Satellites
      </button>
    </div>

    <!-- Tab: Pointing -->
    <div class="tab-pane active" id="tab-pointing">
      <div id="observer-info"></div>
      <div id="selected-info"></div>
    </div>

    <!-- Tab: Satellites -->
    <div class="tab-pane" id="tab-list">
      <div class="panel-controls">
        <div class="control-row">
          <span class="control-label">Min Elevation</span>
          <input type="range" id="cutoff" min="0" max="90" value="0" />
          <span class="control-value"><span id="cutoff-value">0</span>°</span>
        </div>
        <div class="control-row">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="footprint-toggle" />
            <span>Show Footprints</span>
          </label>
        </div>
        <div class="control-row">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="elev-unit-toggle" />
            <span>Zenith angle</span>
          </label>
        </div>
        <button id="export-btn" class="export-btn" title="Export satellite angles as CSV">
          <span class="material-symbols-rounded">download</span>
          Export CSV
        </button>
      </div>
      <div id="sat-table"></div>
    </div>

  </div>

  <!-- Search -->
  <div id="search-container">
    <input id="search" type="text" placeholder="Search location…" autocomplete="off" />
    <div id="autocomplete" class="hidden"></div>
  </div>

  <!-- FAB: geolocation only -->
  <button id="geo" class="floating-btn" title="Use my location">
    <span class="material-symbols-rounded">my_location</span>
  </button>

  <!-- Libraries -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.geodesic/dist/leaflet.geodesic.min.js"></script>

  <!-- App -->
  <script type="module" src="js/app.js"></script>

  <!-- PWA service worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sat/sw.js").catch(() => {});
    }
  </script>

</body>
</html>
