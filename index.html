<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Satellite Antenna Tracker</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- Top App Bar -->
  <header id="app-bar">
    <div class="app-group left">
      <div class="search-container">
        <span class="material-icons">search</span>
        <input id="search" list="suggestions" type="text" placeholder="Search location" autocomplete="off">
      </div>

      <button id="geo" title="Use current location">
        <span class="material-icons">my_location</span>
      </button>
    </div>
  </header>

  <datalist id="suggestions"></datalist>

  <div id="map"></div>

  <!-- Satellite Table Card -->
  <aside id="sat-panel">
    <div class="panel-header">
      <span>Satellites</span>
      <select id="sort">
        <option value="lon">Longitude</option>
        <option value="el">Elevation</option>
      </select>
    </div>
    <div id="sat-table"></div>
  </aside>

  <div id="info"></div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/satellite.js@6.0.2/dist/satellite.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
