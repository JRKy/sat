<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Satellite Antenna Tracker</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Leaflet.Geodesic CSS (none required, but plugin JS needed below) -->

  <!-- Your styles -->
  <link rel="stylesheet" href="styles/main.css">

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>

  <!-- Map container -->
  <div id="map"></div>

  <!-- Satellite Panel -->
  <div id="sat-panel" class="panel">
    <div class="panel-header">
      <button id="panel-close" class="icon-btn"><span class="material-icons">close</span></button>
      <button id="panel-pin" class="icon-btn"><span class="material-icons">push_pin</span></button>
    </div>

    <div class="panel-content">
      <div id="observer-info"></div>
      <div id="selected-info"></div>

      <label>Sort:
        <select id="sort">
          <option value="lon">Longitude</option>
          <option value="el">Elevation</option>
        </select>
      </label>

      <label>Elevation Cutoff:
        <input type="range" id="cutoff" min="0" max="90" value="0">
        <span id="cutoff-value">0</span>°
      </label>

      <label class="panel-footprint">
        <input type="checkbox" id="footprint-toggle">
        Show Footprints
      </label>

      <div id="sat-table"></div>
    </div>
  </div>

  <div id="sat-backdrop"></div>

  <!-- Search -->
  <div id="search-container">
    <input id="search" type="text" placeholder="Search location…">
    <div id="autocomplete" class="hidden"></div>
  </div>

  <!-- Buttons -->
  <button id="geo" class="floating-btn"><span class="material-icons">my_location</span></button>
  <button id="sat-toggle" class="floating-btn"><span class="material-icons">satellite_alt</span></button>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet.Geodesic plugin -->
  <script src="https://unpkg.com/leaflet.geodesic"></script>

  <!-- Satellite.js -->
  <script src="https://unpkg.com/satellite.js/dist/satellite.min.js"></script>

  <!-- Your modular app -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
