<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Satellite Antenna Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="controls">
    <input id="search" list="locations" type="text" placeholder="Search location (e.g. Denver, CO)">
    <datalist id="locations">
      <option value="Black Forest, CO">
      <option value="Denver, CO">
      <option value="Colorado Springs, CO">
      <option value="Washington DC">
      <option value="New York, NY">
      <option value="Los Angeles, CA">
      <option value="London, UK">
      <option value="Tokyo, Japan">
      <option value="Sydney, Australia">
    </datalist>
    <button id="geo">Use My Location</button>
  </div>
  <div id="sat-table"></div>
  <div id="map"></div>
  <div id="info"></div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/satellite.js@6.0.2/dist/satellite.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
