<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="earthGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#1558b0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="256" height="256" rx="28" fill="#202124"/>

  <!-- Earth arc -->
  <path
    d="M48 168a80 80 0 0 1 160 0"
    fill="none"
    stroke="url(#earthGlow)"
    stroke-width="16"
    stroke-linecap="round"
  />

  <!-- Satellite body -->
  <rect x="160" y="64" width="20" height="14" rx="2" fill="#ffffff"/>
  <rect x="148" y="66" width="10" height="10" fill="#cfd8dc"/>
  <rect x="182" y="66" width="10" height="10" fill="#cfd8dc"/>

  <!-- Satellite dish -->
  <circle cx="170" cy="84" r="3" fill="#ffffff"/>

  <!-- Antenna beam -->
  <path
    d="M170 88 L128 132"
    stroke="#1a73e8"
    stroke-width="3"
    stroke-linecap="round"
  />
  <path
    d="M170 88 L144 136"
    stroke="#1a73e8"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.7"
  />
</svg>